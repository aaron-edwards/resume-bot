name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy-api:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT: aaron-edwards-resumebot
      GCP_REGION: australia-southeast1
      ARTIFACT_REGION: australia-southeast1
      IMAGE: australia-southeast1-docker.pkg.dev/aaron-edwards-resumebot/resume-bot/api
      CLOUD_RUN_SERVICE: resume-bot-api

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set active GCP project
        run: gcloud config set project ${{ env.GCP_PROJECT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGION }}-docker.pkg.dev --quiet

      - name: Build and push API image
        run: |
          docker build -f apps/api/Dockerfile -t ${{ env.IMAGE }} .
          docker push ${{ env.IMAGE }}

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image ${{ env.IMAGE }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3001 \
            --set-env-vars GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},CORS_ORIGIN=https://aaron-edwards-resumebot.web.app,SESSION_STORE=firestore

  deploy-web:
    needs: deploy-api
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT: aaron-edwards-resumebot

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build frontend
        env:
          VITE_API_URL: /api
        run: pnpm --filter web build

      - name: Deploy frontend to Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }} --project ${{ env.GCP_PROJECT }}
